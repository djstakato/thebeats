<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Stakato Beats</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div id="app">
      <header class="topbar">
        <div class="brand">STAKATO BEATS</div>
        <button id="shuffle-all-btn" class="shuffle-btn">SHUFFLE ALL</button>
      </header>

      <button
        id="back-to-volumes-btn"
        class="back-to-volumes-btn"
        aria-label="Back to volumes"
      >
        VOLUMES
      </button>

      <main class="page-shell">
        <section class="hero-section" id="hero-section">
          <div class="carousel-shell">
            <div id="carousel-track" class="carousel-track"></div>
          </div>
        </section>

        <section class="songs-section" id="songs-section">
          <div class="songs-inner">
            <div class="songs-kicker">TRACKS</div>
            <div id="song-list" class="song-list"></div>
          </div>
        </section>
      </main>

      <footer class="player-bar">
        <div class="player-left">
          <div id="track-title" class="track-title">No track selected</div>
          <div id="track-meta" class="track-meta"></div>
        </div>

        <div class="player-right">
          <div class="player-controls">
            <button
              id="prev-track-btn"
              class="player-btn"
              aria-label="Previous track"
            >
              ⏮
            </button>
            <button
              id="play-pause-btn"
              class="player-btn play-btn"
              aria-label="Play or pause"
            >
              ▶
            </button>
            <button
              id="next-track-btn"
              class="player-btn"
              aria-label="Next track"
            >
              ⏭
            </button>
          </div>

          <div class="timeline-wrap">
            <span id="current-time" class="time-text">0:00</span>
            <input
              id="seek-bar"
              class="seek-bar"
              type="range"
              min="0"
              max="100"
              value="0"
              step="0.1"
            />
            <span id="duration" class="time-text">0:00</span>
          </div>
        </div>

        <audio id="audio"></audio>
      </footer>
    </div>

    <script src="app.js"></script>
  </body>
</html>
